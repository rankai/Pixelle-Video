services:
  init:
    image: alpine:latest
    volumes:
      - ./:/workspace
    command: >
      sh -c '
        mkdir -p /workspace/data /workspace/output /workspace/temp;
        if [ -d /workspace/config.yaml ]; then
          echo "config.yaml is a directory, removing it";
          rm -rf /workspace/config.yaml;
        fi;
        if [ ! -f /workspace/config.yaml ] && [ -f /workspace/config.example.yaml ]; then
          cp /workspace/config.example.yaml /workspace/config.yaml;
          echo "config.yaml created from config.example.yaml";
        else
          echo "config.yaml already exists";
        fi
      '
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-false}
        IMAGE_TAG: ${IMAGE_TAG:-latest}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: ${REGISTRY:?REGISTRY is required}/pixelle-video-api:${IMAGE_TAG:-latest}
    container_name: pixelle-api
    depends_on:
      init:
        condition: service_completed_successfully
    expose:
      - "8000"
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
      - ./output:/app/output
      - ./temp:/app/temp
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - pixelle-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        IMAGE_TAG: ${IMAGE_TAG:-latest}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: ${REGISTRY:?REGISTRY is required}/pixelle-video-web:${IMAGE_TAG:-latest}
    container_name: pixelle-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - pixelle-network

networks:
  pixelle-network:
    driver: bridge
