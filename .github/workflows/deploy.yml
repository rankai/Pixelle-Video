name: Notify

on:
  push:
    branches: [dev]
    tags: ['v*']

permissions:
  contents: read

jobs:
  web-build:
    name: Build React web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install frontend deps
        run: cd desktop && npm ci
      - name: Build frontend
        run: cd desktop && npm run build

  deploy-safety:
    name: Deploy Safety Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: REGISTRY=example.com/pixelle IMAGE_TAG=ci-test PROJECT_DIR=/opt/pixelle-video DEPLOY_WEBHOOK_SECRET=ci-token docker compose -f docker-compose.prod.yml config
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check webhook script syntax
        run: node --check scripts/webhook-server.js

  notify:
    name: Notify Feishu
    runs-on: ubuntu-latest
    needs: [web-build, deploy-safety]
    if: always()
    steps:
      - name: Notify push via Feishu
        env:
          WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          SHORT_SHA: ${{ github.sha }}
          WEB_BUILD_STATUS: ${{ needs.web-build.result }}
          DEPLOY_SAFETY_STATUS: ${{ needs.deploy-safety.result }}
        run: |
          [ -z "$WEBHOOK_URL" ] && exit 0
          WEB_BUILD_ICON="✅"
          [ "$WEB_BUILD_STATUS" != "success" ] && WEB_BUILD_ICON="⚠️"
          DEPLOY_SAFETY_ICON="✅"
          [ "$DEPLOY_SAFETY_STATUS" != "success" ] && DEPLOY_SAFETY_ICON="⚠️"
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1 | sed 's/"/\\"/g')
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"interactive\",
              \"card\": {
                \"header\": {
                  \"title\": {\"content\": \"🚀 Pixelle-Video 代码已推送，ACR 构建中\", \"tag\": \"plain_text\"},
                  \"template\": \"blue\"
                },
                \"elements\": [
                  {\"tag\": \"div\", \"text\": {\"content\": \"**分支/Tag**: $REF\\n**提交**: $FIRST_LINE\\n**Commit**: ${SHORT_SHA:0:8}\\n**操作人**: $ACTOR\\n**前端构建**: $WEB_BUILD_ICON $WEB_BUILD_STATUS\\n**部署检查**: $DEPLOY_SAFETY_ICON $DEPLOY_SAFETY_STATUS\", \"tag\": \"lark_md\"}},
                  {\"tag\": \"action\", \"actions\": [{\"tag\": \"button\", \"text\": {\"content\": \"查看提交\", \"tag\": \"lark_md\"}, \"url\": \"$RUN_URL\", \"type\": \"default\"}]}
                ]
              }
            }"
