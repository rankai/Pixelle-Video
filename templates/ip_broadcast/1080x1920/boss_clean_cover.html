<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      font-family: "PingFang SC", "Noto Sans CJK SC", sans-serif;
      background: #f6f7f9;
      color: #101828;
      overflow: hidden;
    }
    .bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(180deg, rgba(12,15,18,.04), rgba(12,15,18,.44)),
        url("{{background=assets/boss_clean_bg.jpg}}");
      background-size: cover;
      background-position: center;
    }
    .title {
      position: absolute;
      left: 76px;
      right: 76px;
      top: 230px;
      max-height: 360px;
      overflow: hidden;
      padding: 26px 30px;
      border-radius: 28px;
      border-left: 10px solid #d9a441;
      background: rgba(17,24,39,.34);
      backdrop-filter: blur(3px);
      font-size: 44px;
      line-height: 1.18;
      font-weight: 800;
      letter-spacing: 0;
      color: #fff;
      text-shadow: 0 4px 18px rgba(0,0,0,.48);
    }
    .subtitle {
      position: absolute;
      left: 76px;
      right: 76px;
      bottom: 340px;
      padding: 22px 30px;
      border-left: 0;
      border-radius: 22px;
      background: rgba(17, 24, 39, .36);
      backdrop-filter: blur(3px);
      font-size: 26px;
      line-height: 1.35;
      color: #fff;
      text-shadow: 0 4px 16px rgba(0,0,0,.5);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="title">{{title}}</div>
  <div class="subtitle">{{subtitle=老板 IP 口播}}</div>
</body>
</html>
