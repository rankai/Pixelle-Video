<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      font-family: "PingFang SC", "Noto Sans CJK SC", sans-serif;
      background: #111827;
      color: white;
      overflow: hidden;
    }
    .bg {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(180deg, rgba(17,24,39,.32), rgba(17,24,39,.92)), url("{{background}}");
      background-size: cover;
      background-position: center;
    }
    .tag {
      position: absolute;
      left: 72px;
      top: 132px;
      padding: 14px 22px;
      background: #ef4444;
      color: #fff;
      font-size: 30px;
      font-weight: 800;
    }
    .title {
      position: absolute;
      left: 72px;
      right: 72px;
      top: 240px;
      max-height: 440px;
      overflow: hidden;
      font-size: 76px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    .subtitle {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 190px;
      font-size: 34px;
      line-height: 1.36;
      color: #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="tag">老板观点</div>
  <div class="title">{{title}}</div>
  <div class="subtitle">{{subtitle=一句话讲透商业认知}}</div>
</body>
</html>
